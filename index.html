<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ma Bibliothèque Kobo</title>
    <style>
        body { font-family: sans-serif; padding: 30px; font-size: 20px; line-height: 1.6; }
        h1 { border-bottom: 2px solid #000; padding-bottom: 10px; }
        ul { list-style-type: none; padding: 0; }
        li { margin-bottom: 20px; padding: 10px; border-bottom: 1px solid #eee; }
        a { color: #0056b3; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <h1>📚 Ma Bibliothèque Privée</h1>
    <ul id="liste-livres">Lecture du dossier des livres...</ul>

    <script>
        // CONFIGURATION : Mettez ici le nom exact de votre dossier de livres séparé
        const nomDossierLivres = "dossier-livres";
        const githubUtilisateur = "Thimeo-dev";
        const githubDepot = "Ebook-Cloud";
        const urlApi = `https://api.github.com/repos/${githubUtilisateur}/${githubDepot}/contents/${nomDossierLivres}`;

        function afficherMessage(message) {
            document.getElementById('liste-livres').innerHTML = `<li>${message}</li>`;
        }

        function afficherLivres(livres) {
            const listeUl = document.getElementById('liste-livres');
            listeUl.innerHTML = '';

            livres.forEach(livre => {
                const li = document.createElement('li');
                const titrePropre = livre.replace('.epub', '').replace(/[-_]/g, ' ');
                li.innerHTML = `<a href="${nomDossierLivres}/${livre}">${titrePropre}</a>`;
                listeUl.appendChild(li);
            });
        }

        function filtrerEpubs(noms) {
            return noms.filter(nom => nom.toLowerCase().endsWith('.epub'));
        }

        async function fetchGithubLivres() {
            const response = await fetch(urlApi);
            if (!response.ok) {
                throw new Error(`Statut ${response.status}`);
            }
            const items = await response.json();
            return filtrerEpubs(items.map(item => item.name));
        }

        async function chargerLivres() {
            if (window.location.protocol === 'file:') {
                afficherMessage('Ouvrez cette page via HTTP ou hébergez-la en ligne pour que lister les livres fonctionne correctement.');
                return;
            }

            try {
                const livres = await fetchGithubLivres();

                if (livres.length === 0) {
                    afficherMessage(`Aucun livre trouvé dans le dossier "${nomDossierLivres}".`);
                    return;
                }

                afficherLivres(livres);
            } catch (erreur) {
                afficherMessage('Impossible de récupérer les livres depuis GitHub. Vérifiez le nom du dépôt, du dossier et que le dépôt est public.');
                console.error(erreur);
            }
        }

        chargerLivres();
    </script>
</body>
</html>
