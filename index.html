<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ma Bibliothèque Kobo</title>
    <style>
        body { font-family: sans-serif; padding: 30px; font-size: 20px; line-height: 1.6; }
        h1 { border-bottom: 2px solid #000; padding-bottom: 10px; }
        ul { list-style-type: none; padding: 0; }
        li { margin-bottom: 20px; padding: 10px; border-bottom: 1px solid #eee; }
        a { color: #0056b3; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <h1>📚 Ma Bibliothèque Kobo</h1>
    <ul id="liste-livres">Lavage en cours...</ul>

    <script>
        // CONFIGURATION : Remplacez par vos informations
        const utilisateur = "VOTRE_PSEUDO_GITHUB";
        const depot = "LE_NOM_DE_VOTRE_PROJET";

        const urlApi = `https://api.github.com/repos/${utilisateur}/${depot}/contents/livres`;

        async function chargerLivres() {
            try {
                const reponse = await fetch(urlApi);
                const fichiers = await reponse.json();
                const listeUl = document.getElementById('liste-livres');
                listeUl.innerHTML = ''; // Vide le texte de chargement

                // On filtre pour ne garder que les fichiers qui finissent par .epub
                const livres = fichiers.filter(f => f.name.endsWith('.epub'));

                if (livres.length === 0) {
                    listeUl.innerHTML = '<li>Aucun livre trouvé dans le dossier "livres".</li>';
                    return;
                }

                livres.forEach(livre => {
                    const li = document.createElement('li');
                    
                    // Nettoie le nom du fichier pour l'affichage (enlève le .epub et remplace les sous-tirets)
                    const titrePropre = livre.name.replace('.epub', '').replace(/_/g, ' ');
                    
                    // Crée le lien de téléchargement direct
                    li.innerHTML = `<a href="livres/${livre.name}">${titrePropre}</a>`;
                    listeUl.appendChild(li);
                });
            } catch (erreur) {
                document.getElementById('liste-livres').innerHTML = '<li>Erreur lors du chargement des livres.</li>';
            }
        }

        chargerLivres();
    </script>
</body>
</html>
