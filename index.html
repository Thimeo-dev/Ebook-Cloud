<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ma Bibliothèque Kobo</title>
    <style>
        body { font-family: sans-serif; padding: 30px; font-size: 20px; line-height: 1.6; }
        h1 { border-bottom: 2px solid #000; padding-bottom: 10px; }
        ul { list-style-type: none; padding: 0; }
        li { margin-bottom: 20px; padding: 10px; border-bottom: 1px solid #eee; }
        a { color: #0056b3; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <h1>📚 Ma Bibliothèque Privée</h1>
    <ul id="liste-livres">Lecture du dossier des livres...</ul>

    <script>
        // CONFIGURATION : Mettez ici le nom exact de votre dossier de livres séparé
        const nomDossierLivres = "dossier-livres";

        // Détection automatique de vos informations GitHub via l'URL
        const utilisateur = window.location.hostname.split('.')[0];
        const depot = window.location.pathname.split('/')[1];
        const urlApi = `https://api.github.com/repos/${utilisateur}/${depot}/contents/${nomDossierLivres}`;

        function afficherMessage(message) {
            document.getElementById('liste-livres').innerHTML = `<li>${message}</li>`;
        }

        function afficherLivres(livres) {
            const listeUl = document.getElementById('liste-livres');
            listeUl.innerHTML = '';

            livres.forEach(livre => {
                const li = document.createElement('li');
                const titrePropre = livre.replace('.epub', '').replace(/[-_]/g, ' ');
                li.innerHTML = `<a href="${nomDossierLivres}/${livre}">${titrePropre}</a>`;
                listeUl.appendChild(li);
            });
        }

        function filtrerEpubs(noms) {
            return noms.filter(nom => nom.toLowerCase().endsWith('.epub'));
        }

        async function fetchGithubLivres() {
            const response = await fetch(urlApi);
            if (!response.ok) {
                throw new Error(`Statut ${response.status}`);
            }
            const items = await response.json();
            return filtrerEpubs(items.map(item => item.name));
        }

        async function fetchLocalDirectoryLivres() {
            const response = await fetch(`${nomDossierLivres}/`);
            if (!response.ok) {
                throw new Error(`Statut ${response.status}`);
            }
            const html = await response.text();
            const parser = new DOMParser();
            const documentHtml = parser.parseFromString(html, 'text/html');
            const liens = Array.from(documentHtml.querySelectorAll('a'));
            return filtrerEpubs(liens
                .map(a => a.getAttribute('href') || '')
                .filter(href => href && !href.startsWith('..') && !href.endsWith('/'))
                .map(href => decodeURIComponent(href)));
        }

        async function chargerLivres() {
            const listeUl = document.getElementById('liste-livres');

            if (window.location.protocol === 'file:') {
                afficherMessage('Ouvrez cette page via un serveur HTTP pour lire les livres du dossier. Par exemple : python3 -m http.server');
                return;
            }

            try {
                let livres = [];
                if (window.location.hostname.includes('github.io') || (utilisateur && depot)) {
                    livres = await fetchGithubLivres();
                }

                if (livres.length === 0) {
                    livres = await fetchLocalDirectoryLivres();
                }

                if (livres.length === 0) {
                    afficherMessage(`Aucun livre trouvé dans le dossier "${nomDossierLivres}".`);
                    return;
                }

                afficherLivres(livres);
            } catch (erreur) {
                afficherMessage('Impossible de récupérer les livres depuis le dossier. Vérifiez que le dossier existe et que le serveur HTTP renvoie un index de dossier.');
                console.error(erreur);
            }
        }

        chargerLivres();
    </script>
</body>
</html>
