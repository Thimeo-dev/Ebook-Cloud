<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ma Bibliothèque Kobo</title>
    <style>
        body { font-family: sans-serif; padding: 30px; font-size: 20px; line-height: 1.6; }
        h1 { border-bottom: 2px solid #000; padding-bottom: 10px; }
        ul { list-style-type: none; padding: 0; }
        li { margin-bottom: 20px; padding: 10px; border-bottom: 1px solid #eee; }
        a { color: #0056b3; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <h1>📚 Ma Bibliothèque Privée</h1>
    <ul id="liste-livres">Lecture du dossier des livres...</ul>

    <script>
        // CONFIGURATION : Mettez ici le nom exact de votre dossier de livres séparé
        const nomDossierLivres = "dossier-livres"; 

        // Détection automatique de vos informations GitHub via l'URL
        const utilisateur = window.location.hostname.split('.')[0];
        const depot = window.location.pathname.split('/')[1];

        const urlApi = `https://github.com{utilisateur}/${depot}/contents/${nomDossierLivres}`;

        async function chargerLivres() {
            try {
                const reponse = await fetch(urlApi);
                const fichiers = await reponse.json();
                const listeUl = document.getElementById('liste-livres');
                listeUl.innerHTML = ''; 

                // On filtre pour ne prendre que les ebooks
                const livres = fichiers.filter(f => f.name.endsWith('.epub'));

                if (livres.length === 0) {
                    listeUl.innerHTML = `<li>Aucun livre trouvé dans le dossier "${nomDossierLivres}".</li>`;
                    return;
                }

                livres.forEach(livre => {
                    const li = document.createElement('li');
                    
                    // Rend le titre joli à lire (enlève l'extension et remplace les tirets)
                    const titrePropre = livre.name.replace('.epub', '').replace(/[-_]/g, ' ');
                    
                    // Crée le lien qui pointe correctement vers le dossier séparé
                    li.innerHTML = `<a href="${nomDossierLivres}/${livre.name}">${titrePropre}</a>`;
                    listeUl.appendChild(li);
                });
            } catch (erreur) {
                document.getElementById('liste-livres').innerHTML = '<li>Erreur : Impossible d\'accéder au dossier de livres. Vérifiez le nom.</li>';
            }
        }

        chargerLivres();
    </script>
</body>
</html>
